services:
  mysql:
    image: mysql:8.0
    container_name: shopease-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: shopease
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: shopease-backend
    ports:
      - "8081:8080"
    environment:
      DB_WRITER_URL: mysql
      DB_USER: root
      DB_PASSWORD: password
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: shopease-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
